name: CI

on:
  push:
    branches:
      - '**'

jobs:
  test-and-lint:
    name: pytest & pylint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install project + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

      - name: Run pylint
        run: python -m pylint src/ --fail-under=9.5
